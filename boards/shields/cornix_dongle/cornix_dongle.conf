# ───────── Cornix dongle (XIAO nRF52840) = split central ─────────
# Dongle is USB-powered; do not sleep.
CONFIG_ZMK_SLEEP=n

CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Boost radio TX power for better split link.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Total simultaneous BLE connections = 2 peripherals (left+right) + 3 host profiles.
# ZMK derives host profile count as BT_MAX_PAIRED - SPLIT_BLE_CENTRAL_PERIPHERALS,
# so 5 - 2 = 3 host profiles.
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Pull peripheral battery levels and proxy them over BAS.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_BT_BAS=y

# Pointing (mouse move / click / scroll, and encoder -> &msc scroll).
CONFIG_ZMK_POINTING=y

# Standard 6KRO (NKRO off, matches cornix stock config).
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n

# ZMK Studio over USB.
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# ───────── Raw HID + application protocol (all features) ─────────
CONFIG_RAW_HID=y
CONFIG_RAWHID_APP=y
CONFIG_RAWHID_APP_LAYER_CONTROL=y
CONFIG_RAWHID_APP_TIME_SYNC=y
CONFIG_RAWHID_APP_AI_USAGE=y

# ───────── Prospector RING status screen ─────────
CONFIG_PROSPECTOR_STATUS_SCREEN_RING=y

# No ambient light sensor; use a fixed brightness.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=60
CONFIG_PROSPECTOR_LAYER_NAME_UPPERCASE=n
CONFIG_PROSPECTOR_DISPLAY_IDLE_TIMEOUT=300

# Touch disabled -> never select the CST816S touch driver.
CONFIG_PROSPECTOR_DISPLAY_TOUCH_WAKE=n

# Control everything with keycodes instead of touch (default keycodes):
#   brightness +/- = F24 / F23
CONFIG_PROSPECTOR_BRIGHTNESS_KEY_CONTROL=y
#   dark-theme toggle = F20
CONFIG_PROSPECTOR_RING_DARK_TOGGLE_KEY=y
# Show last emitted HID key on the ring layout.
CONFIG_PROSPECTOR_RING_LAST_KEY_DISPLAY=y

# AI Usage screen, toggled by keycode F21 (data supplied via RAWHID_APP_AI_USAGE).
CONFIG_PROSPECTOR_RING_AI_USAGE=y
CONFIG_PROSPECTOR_RING_AI_USAGE_TOGGLE_KEY=y

# ───────── Free the pins the Prospector board overlay would otherwise grab ─────────
# The Prospector XIAO overlay declares an APDS9960 ambient-light sensor whose IRQ
# is on P0.28 — the SAME pin as our dongle col0 (D2). We do not use ambient light,
# so drop the driver (auto-enabled from devicetree) to release P0.28 for the matrix.
CONFIG_APDS9960=n
# Touch is disabled; drop the CST816S touch driver too (also saves RAM).
CONFIG_INPUT_CST816S=n
