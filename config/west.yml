# ZMK Config for Cornix (XIAO nRF52840 dongle + Prospector + RawHID)
manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: hrmt-lab
      url-base: https://github.com/hrmt-lab
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
    # Cornix board/shield definitions (cornix_left / cornix_right / cornix_ph_left, indicator)
    - name: zmk-keyboard-cornix
      remote: hrmt-lab
      revision: main
    # Prospector ring status screen (dongle display)
    - name: prospector-zmk-module-ring
      remote: hrmt-lab
      revision: main
    # Raw HID transport + application protocol (time / layer / AI usage)
    - name: zmk-raw-hid
      remote: hrmt-lab
      revision: custom/raw-hid-custom
    - name: zmk-rawhid-app
      remote: hrmt-lab
      revision: main
  self:
    path: config
